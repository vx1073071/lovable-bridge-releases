name: Bridge Release

# 打 tag 触发：git tag bridge-v0.1.0 && git push --tags
on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Build all targets
        working-directory: bridge
        run: bash scripts/build-all.sh

      # ── Windows Authenticode 签名（可选；缺 secrets 自动跳过）──
      # 推荐用 SignPath / Azure Trusted Signing / DigiCert KeyLocker，
      # 这里以 base64 编码的 PFX + 密码为最小可用示例。
      - name: Sign Windows binary
        if: ${{ env.WIN_PFX_BASE64 != '' }}
        working-directory: bridge
        env:
          WIN_PFX_BASE64: ${{ secrets.WIN_PFX_BASE64 }}
          WIN_PFX_PASSWORD: ${{ secrets.WIN_PFX_PASSWORD }}
        run: |
          echo "$WIN_PFX_BASE64" | base64 -d > /tmp/cert.pfx
          sudo apt-get update && sudo apt-get install -y osslsigncode
          osslsigncode sign \
            -pkcs12 /tmp/cert.pfx -pass "$WIN_PFX_PASSWORD" \
            -n "Lovable Bridge" -i "https://lovable.dev" \
            -t http://timestamp.digicert.com \
            -in dist/LovableBridge.exe \
            -out dist/LovableBridge.signed.exe
          mv dist/LovableBridge.signed.exe dist/LovableBridge.exe
          rm -f /tmp/cert.pfx

      # ── macOS codesign + notarytool（需要 macOS runner）──
      # 触发条件：仓库 secrets 里配齐 MAC_* 三件套时启用一个并行 job。
      # 见下方 macos-sign job。

      - name: Bundle Windows installer
        working-directory: bridge
        run: |
          mkdir -p out/windows
          cp dist/LovableBridge.exe out/windows/
          cp installers/windows/*.ps1 out/windows/
          (cd out/windows && zip -r ../LovableBridge-windows-x64.zip .)

      - name: Bundle macOS installer (arm64)
        working-directory: bridge
        run: |
          mkdir -p out/mac-arm64
          cp dist/LovableBridge-mac-arm64 out/mac-arm64/
          cp installers/macos/* out/mac-arm64/
          chmod +x out/mac-arm64/*.sh
          (cd out/mac-arm64 && zip -r ../LovableBridge-mac-arm64.zip .)

      - name: Bundle macOS installer (x64)
        working-directory: bridge
        run: |
          mkdir -p out/mac-x64
          cp dist/LovableBridge-mac-x64 out/mac-x64/
          cp installers/macos/* out/mac-x64/
          chmod +x out/mac-x64/*.sh
          (cd out/mac-x64 && zip -r ../LovableBridge-mac-x64.zip .)

      - name: Linux tarball
        working-directory: bridge
        run: tar czf out/LovableBridge-linux-x64.tar.gz -C dist LovableBridge-linux-x64

      - name: Copy raw binaries for self-update
        working-directory: bridge
        run: |
          cp dist/LovableBridge.exe              out/LovableBridge.exe
          cp dist/LovableBridge-mac-arm64        out/LovableBridge-mac-arm64
          cp dist/LovableBridge-mac-x64          out/LovableBridge-mac-x64
          cp dist/LovableBridge-linux-x64        out/LovableBridge-linux-x64

      - name: Compute sha256
        working-directory: bridge/out
        run: |
          sha256sum LovableBridge.exe LovableBridge-mac-arm64 LovableBridge-mac-x64 LovableBridge-linux-x64 > sha256.txt
          cat sha256.txt

      - name: Write manifest
        working-directory: bridge
        run: |
          TAG="${GITHUB_REF_NAME#bridge-v}"
          WIN_SHA=$(sha256sum out/LovableBridge.exe         | awk '{print $1}')
          MA_SHA=$(sha256sum  out/LovableBridge-mac-arm64   | awk '{print $1}')
          MX_SHA=$(sha256sum  out/LovableBridge-mac-x64     | awk '{print $1}')
          LN_SHA=$(sha256sum  out/LovableBridge-linux-x64   | awk '{print $1}')
          cat > out/latest.json <<JSON
          {
            "version": "${TAG}",
            "assets": {
              "windows-x64": "LovableBridge-windows-x64.zip",
              "mac-arm64":   "LovableBridge-mac-arm64.zip",
              "mac-x64":     "LovableBridge-mac-x64.zip",
              "linux-x64":   "LovableBridge-linux-x64.tar.gz"
            },
            "binaries": {
              "windows-x64": { "name": "LovableBridge.exe",             "sha256": "${WIN_SHA}" },
              "mac-arm64":   { "name": "LovableBridge-mac-arm64",       "sha256": "${MA_SHA}" },
              "mac-x64":     { "name": "LovableBridge-mac-x64",         "sha256": "${MX_SHA}" },
              "linux-x64":   { "name": "LovableBridge-linux-x64",       "sha256": "${LN_SHA}" }
            }
          }
          JSON

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bridge/out/*
          generate_release_notes: true

  # ── macOS 签名 + 公证（在 macOS runner 上跑；缺 secrets 自动跳过）──
  macos-sign:
    if: ${{ vars.ENABLE_MAC_NOTARIZE == 'true' }}
    runs-on: macos-14
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Build mac binaries
        working-directory: bridge
        run: |
          bun build index.ts --compile --target=bun-darwin-arm64 --outfile=dist/LovableBridge-mac-arm64
          bun build index.ts --compile --target=bun-darwin-x64   --outfile=dist/LovableBridge-mac-x64
      - name: Import signing cert
        working-directory: bridge
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$MAC_CERT_BASE64" | base64 -d > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
      - name: Codesign + notarize
        working-directory: bridge
        env:
          MAC_DEV_ID: ${{ secrets.MAC_DEV_ID }}          # e.g. "Developer ID Application: Lovable Inc (TEAMID)"
          MAC_APPLE_ID: ${{ secrets.MAC_APPLE_ID }}
          MAC_TEAM_ID: ${{ secrets.MAC_TEAM_ID }}
          MAC_NOTARY_PWD: ${{ secrets.MAC_NOTARY_PWD }}  # app-specific password
        run: |
          for bin in dist/LovableBridge-mac-arm64 dist/LovableBridge-mac-x64; do
            codesign --force --options runtime --timestamp --sign "$MAC_DEV_ID" "$bin"
            ditto -c -k --keepParent "$bin" "$bin.zip"
            xcrun notarytool submit "$bin.zip" \
              --apple-id "$MAC_APPLE_ID" --team-id "$MAC_TEAM_ID" --password "$MAC_NOTARY_PWD" --wait
            # 单文件 CLI 二进制不支持 stapler；用户首次运行后 Gatekeeper 在线校验票据即可。
          done
      - name: Upload signed mac binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: bridge/dist/LovableBridge-mac-*